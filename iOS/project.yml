name: SoleCraft
options:
  bundleIdPrefix: com.shimondeitel.leatherlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SoleCraft:
    type: application
    platform: iOS
    sources:
      - path: SoleCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leatherlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SoleCraft/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SoleCraftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoleCraftTests
      - path: SoleCraft.storekit
    dependencies:
      - target: SoleCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leatherlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SoleCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SoleCraftUITests
    dependencies:
      - target: SoleCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.leatherlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SoleCraft:
    build:
      targets:
        SoleCraft: all
        SoleCraftTests: [test]
        SoleCraftUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SoleCraft.storekit
    test:
      config: Debug
      storeKitConfiguration: SoleCraft.storekit
      targets:
        - SoleCraftTests
        - SoleCraftUITests
    archive:
      config: Release
